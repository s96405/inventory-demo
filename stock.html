<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>庫存進度查詢 Demo</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <main class="page">
        <header class="page-header">
            <div>
                <h1>庫存進度查詢 Demo</h1>
                <p>由 Excel 資料轉換而成的庫存與製令查詢看板</p>
            </div>
        </header>

        <section class="cards">
            <div class="card">
                <span>總筆數</span>
                <strong id="totalCount">0</strong>
            </div>

            <div class="card">
                <span>總入料數</span>
                <strong id="totalInputQty">0</strong>
            </div>

            <div class="card">
                <span>總入庫數</span>
                <strong id="totalStockInQty">0</strong>
            </div>

            <div class="card">
                <span>總不良數</span>
                <strong id="totalBadQty">0</strong>
            </div>
        </section>

        <section class="toolbar">
            <input id="searchWorkOrder" type="text" placeholder="搜尋製令單號" />
            <input id="searchItemNo" type="text" placeholder="搜尋料號" />


            <button id="resetBtn" type="button">清除條件</button>
        </section>

        <section class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>來源表</th>
                        <th>來料日期</th>
                        <th>製令單號</th>
                        <th>料號</th>
                        <th>入料數</th>
                        <th>入庫數</th>
                        <th>未入庫</th>
                        <th>可出貨</th>
                        <th>已出貨</th>
                        <th>總不良</th>
                        <th>直通率</th>
                    </tr>
                </thead>

                <tbody id="tableBody">
                    <tr>
                        <td colspan="12" class="empty">資料載入中...</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>

</html>
